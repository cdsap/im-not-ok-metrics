name: Collect Android GC Corpus

on:
  workflow_dispatch:
    inputs:
      target_repository:
        description: owner/repo to profile
        required: true
      target_ref:
        description: git ref for target_repository
        required: false
        default: ""
      gradle_command:
        description: Gradle command to execute
        required: false
        default: ./gradlew assembleDebug --stacktrace
      iterations_json:
        description: JSON array of iteration ids
        required: false
        default: "[1,2,3]"
      project_slug:
        description: Stable dataset slug for this project
        required: false
        default: ""
      configuration_slug:
        description: Stable dataset slug for this workload shape
        required: false
        default: assemble-debug
      run_kind:
        description: clean, warm, incremental, lint, test, or custom
        required: false
        default: clean
      deep_mode:
        description: Enable JFR collection
        required: false
        type: boolean
        default: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        iteration: ${{ fromJson(inputs.iterations_json) }}

    steps:
      - name: Check out harness repository
        uses: actions/checkout@v4
        with:
          path: harness

      - name: Check out target project repository default branch
        uses: actions/checkout@v4
        if: ${{ inputs.target_ref == '' }}
        with:
          repository: ${{ inputs.target_repository }}
          path: project

      - name: Check out target project repository explicit ref
        uses: actions/checkout@v4
        if: ${{ inputs.target_ref != '' }}
        with:
          repository: ${{ inputs.target_repository }}
          ref: ${{ inputs.target_ref }}
          path: project

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"

      - name: Make harness scripts executable
        run: chmod +x harness/scripts/*.sh harness/scripts/*.py

      - name: Run profiled corpus collection
        env:
          DEEP: ${{ inputs.deep_mode == true && '1' || '0' }}
          PROJECT_ROOT: ${{ github.workspace }}/project
          PROJECT_SLUG: ${{ inputs.project_slug != '' && inputs.project_slug || github.event.inputs.target_repository }}
          CONFIGURATION_SLUG: ${{ inputs.configuration_slug }}
          RUN_KIND: ${{ inputs.run_kind }}
          ITERATION: ${{ matrix.iteration }}
          RUNNER_OS: ubuntu-latest
          RUNNER_VCPUS: "4"
          RUNNER_MEMORY_GB: "16"
        working-directory: ${{ github.workspace }}/harness
        run: scripts/run_build.sh "${{ inputs.gradle_command }}"

      - name: Build dataset index for this workspace
        if: always()
        working-directory: ${{ github.workspace }}/harness
        run: scripts/index_dataset.sh "${{ github.workspace }}/project/artifacts"

      - name: Upload corpus artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-${{ inputs.project_slug != '' && inputs.project_slug || 'project' }}-${{ inputs.configuration_slug }}-iter-${{ matrix.iteration }}
          path: |
            project/artifacts/
