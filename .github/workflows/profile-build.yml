name: Profile Android Build

on:
  workflow_dispatch:
    inputs:
      target_repository:
        description: Optional owner/repo to profile instead of the repository containing this workflow
        required: false
        default: ""
      target_ref:
        description: Optional git ref for target_repository
        required: false
        default: ""
      gradle_command:
        description: Gradle command to run through the profiling harness
        required: false
        default: ./gradlew assembleDebug --stacktrace
      deep_mode:
        description: Enable JFR collection in addition to GC logs and OS sampling
        required: false
        type: boolean
        default: false
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  profile-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out harness repository
        uses: actions/checkout@v4
        with:
          path: harness

      - name: Check out target project repository from current repo
        uses: actions/checkout@v4
        if: ${{ inputs.target_repository == '' }}
        with:
          path: project

      - name: Check out target project repository default branch
        uses: actions/checkout@v4
        if: ${{ inputs.target_repository != '' && inputs.target_ref == '' }}
        with:
          repository: ${{ inputs.target_repository }}
          path: project

      - name: Check out target project repository explicit ref
        uses: actions/checkout@v4
        if: ${{ inputs.target_repository != '' && inputs.target_ref != '' }}
        with:
          repository: ${{ inputs.target_repository }}
          ref: ${{ inputs.target_ref }}
          path: project

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"

      - name: Make harness scripts executable
        run: chmod +x harness/scripts/*.sh harness/scripts/*.py

      - name: Run profiled Gradle build
        env:
          DEEP: ${{ inputs.deep_mode == true && '1' || '0' }}
          PROJECT_ROOT: ${{ github.workspace }}/project
        working-directory: ${{ github.workspace }}/harness
        run: scripts/run_build.sh "${{ inputs.gradle_command || './gradlew assembleDebug --stacktrace' }}"

      - name: Upload profiling artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-jvm-gc-artifacts
          path: project/artifacts/
